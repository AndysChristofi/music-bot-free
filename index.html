<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DJ Robo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="chat-widget">
    <div class="chat-header">
      <div class="chat-header-left">
        <img src="logo.png" alt="DJ Robo Logo" class="header-logo" />
        <div class="chat-header-text">DJ ROBO</div>
      </div>

      <button id="reloadChat" class="header-icon-btn" type="button" title="Ανανέωση">↻</button>
    </div>

    <div id="chatMessages" class="chat-messages"></div>

    <div class="chat-input-wrap">
      <div class="chat-input-area">
        <input
          id="query"
          type="text"
          placeholder="Message..."
          autocomplete="off"
        />
        <button id="searchBtn" type="button" class="send-btn">↑</button>
      </div>
      <div class="chat-footer-note">Powered by DJ Robo</div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
