<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Music Finder</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="widget">
    <div class="header">Music Finder</div>

    <div class="body">
      <p class="intro">Type a song title or artist name.</p>

      <div class="search-row">
        <input id="query" type="text" placeholder="Example: Adele or Hello" />
        <button id="searchBtn">Search</button>
      </div>

      <div id="result" class="result hidden"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
